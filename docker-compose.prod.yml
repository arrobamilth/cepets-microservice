name: cepets-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node services/auth-service/src/index.js
    environment:
      NODE_ENV: ${NODE_ENV}
      AUTH_SERVICE_PORT: 4101
      USER_SERVICE_URL: http://user-service:4102
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node services/user-service/src/index.js
    environment:
      NODE_ENV: ${NODE_ENV}
      USER_SERVICE_PORT: 4102
      AUTH_SERVICE_URL: http://auth-service:4101
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  pet-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node services/pet-service/src/index.js
    environment:
      NODE_ENV: ${NODE_ENV}
      PET_SERVICE_PORT: 4103
      IMAGE_SERVICE_URL: http://image-service:4104
      USER_SERVICE_URL: http://user-service:4102
      ADOPTION_SERVICE_URL: http://adoption-service:4105
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  image-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node services/image-service/src/index.js
    environment:
      NODE_ENV: ${NODE_ENV}
      IMAGE_SERVICE_PORT: 4104
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - image-uploads:/app/services/image-service/uploads

  adoption-service:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node services/adoption-service/src/index.js
    environment:
      NODE_ENV: ${NODE_ENV}
      ADOPTION_SERVICE_PORT: 4105
      PET_SERVICE_URL: http://pet-service:4103
      USER_SERVICE_URL: http://user-service:4102
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node services/gateway/src/index.js
    environment:
      NODE_ENV: ${NODE_ENV}
      GATEWAY_PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4101
      USER_SERVICE_URL: http://user-service:4102
      PET_SERVICE_URL: http://pet-service:4103
      IMAGE_SERVICE_URL: http://image-service:4104
      ADOPTION_SERVICE_URL: http://adoption-service:4105
    depends_on:
      - auth-service
      - user-service
      - pet-service
      - image-service
      - adoption-service

  web:
    build:
      context: .
      dockerfile: docker/node-service.Dockerfile
    restart: unless-stopped
    command: node apps/web/server.js
    environment:
      NODE_ENV: ${NODE_ENV}
      WEB_PORT: 3000
      CEPETS_API_URL: /api
    depends_on:
      - gateway

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - gateway
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "${PUBLIC_HTTP_PORT}:80"
      - "${PUBLIC_HTTPS_PORT}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  image-uploads:
  caddy-data:
  caddy-config:
