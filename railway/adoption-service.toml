[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/node-service.Dockerfile"
watchPatterns = [
  "/package.json",
  "/package-lock.json",
  "/docker/node-service.Dockerfile",
  "/packages/shared/**",
  "/railway/adoption-service.toml",
  "/services/adoption-service/**",
  "/services/pet-service/**",
  "/services/user-service/**"
]

[deploy]
startCommand = "node services/adoption-service/src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
