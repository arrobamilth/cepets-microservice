[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/node-service.Dockerfile"
watchPatterns = [
  "/package.json",
  "/package-lock.json",
  "/docker/node-service.Dockerfile",
  "/packages/shared/**",
  "/railway/gateway.toml",
  "/services/gateway/**",
  "/services/auth-service/**",
  "/services/user-service/**",
  "/services/pet-service/**",
  "/services/image-service/**",
  "/services/adoption-service/**"
]

[deploy]
startCommand = "node services/gateway/src/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
