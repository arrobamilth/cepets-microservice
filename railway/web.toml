[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/node-service.Dockerfile"
watchPatterns = [
  "/package.json",
  "/package-lock.json",
  "/docker/node-service.Dockerfile",
  "/apps/web/**",
  "/packages/shared/**",
  "/railway/web.toml",
  "/services/gateway/**"
]

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
